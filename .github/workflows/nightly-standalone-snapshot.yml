name: Nightly (Jahia SN)

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  integration-tests:
    uses: Jahia/jahia-modules-action/.github/workflows/reusable-integration-tests.yml@v2
    secrets: inherit
    with:
      jahia_image: 'ghcr.io/jahia/jahia-ee-dev:8-SNAPSHOT'
      module_id: saml-authentication-valve
      module_branch: ${{ github.ref }}
      testrail_project: SAML Module
      provisioning_manifest: 'provisioning-manifest-snapshot.yml'
      artifact_prefix: saml
      incident_service: saml-authentication-valve-JahiaRL
